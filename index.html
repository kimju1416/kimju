<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kimju.zip — 앱 아카이브</title>
<meta name="description" content="@kimju.zip이 만든 선생님을 위한 GAS 웹앱 모음">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0c;
  --surface:#141414;
  --surface2:#1c1c1c;
  --border:rgba(255,255,255,0.07);
  --border-hover:rgba(255,255,255,0.18);
  --text:#f0f0ee;
  --sub:#999;
  --muted:#565656;
  --accent:#b8f03c;
  --accent-glow:rgba(184,240,60,0.12);
  --accent-text:#0c0c0c;
  --max:1200px;
  --px:2.5rem;
}
html,body{min-height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;line-height:1.6;}

/* ─── HEADER ─── */
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(12,12,12,0.93);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}
.header-inner{
  max-width:var(--max);margin:0 auto;padding:0 var(--px);
  display:flex;align-items:center;justify-content:space-between;
  height:58px;gap:1.5rem;
}
.logo{font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:700;letter-spacing:-.03em;flex-shrink:0;text-decoration:none;color:var(--text);}
.logo span{color:var(--accent);}
.search-wrap{flex:1;max-width:360px;position:relative;}
.search-icon{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none;}
.search-input{
  width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;
  padding:.5rem 1rem .5rem 2.4rem;outline:none;transition:border-color .2s,background .2s;
}
.search-input::placeholder{color:var(--muted);}
.search-input:focus{border-color:rgba(184,240,60,.35);background:#181818;}
.header-btns{display:flex;gap:8px;align-items:center;flex-shrink:0;}
.insta-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--border);background:transparent;
  cursor:pointer;text-decoration:none;transition:all .18s;flex-shrink:0;
}
.insta-btn:hover{border-color:var(--border-hover);background:var(--surface2);}
.insta-btn svg{width:17px;height:17px;}
.threads-btn{
  display:inline-flex;align-items:center;gap:5px;
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.02em;
  color:var(--sub);background:transparent;
  border:1px solid var(--border);border-radius:20px;padding:.4rem 1.1rem;
  cursor:pointer;text-decoration:none;white-space:nowrap;transition:all .18s;
}
.threads-btn:hover{border-color:var(--border-hover);color:var(--text);}

/* ─── HERO ─── */
.hero{max-width:var(--max);margin:0 auto;padding:3.5rem var(--px) 2.5rem;}
.hero-inner{display:grid;grid-template-columns:1fr 210px;gap:2.5rem;align-items:end;}
.hero-eyebrow{
  font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.12em;color:var(--text);
  text-transform:uppercase;margin-bottom:.9rem;display:flex;align-items:center;gap:.7rem;opacity:.5;
}
.hero-eyebrow::before{content:'';display:block;width:24px;height:1px;background:var(--accent);}
.hero-title{
  font-family:'Space Grotesk',sans-serif;
  font-size:clamp(2rem,4vw,3.2rem);font-weight:700;letter-spacing:-.04em;line-height:1.05;margin-bottom:1rem;
}
.hero-title em{color:var(--accent);font-style:normal;}
.hero-subtitle{
  font-family:'DM Mono',monospace;font-size:13px;letter-spacing:.08em;
  color:var(--sub);text-transform:uppercase;margin-top:.5rem;margin-bottom:.85rem;
  display:flex;align-items:center;gap:.6rem;
}
.hero-subtitle::before{content:'';display:block;width:16px;height:1px;background:var(--sub);}
.hero-desc{font-size:14px;color:var(--sub);line-height:1.8;}
.hero-stats{
  display:flex;gap:2.5rem;margin-top:2rem;
  padding-top:1.5rem;border-top:1px solid var(--border);flex-wrap:wrap;
}
.stat{display:flex;flex-direction:column;gap:3px;}
.stat-num{font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:700;color:var(--accent);line-height:1;}
.stat-lbl{font-family:'DM Mono',monospace;font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}

/* ─── HERO CHAR ─── */
.hero-char{
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  border:1px solid var(--border);border-radius:14px;
  background:#000;overflow:hidden;height:280px;
  transition:border-color .2s;
}
.hero-char:hover{border-color:rgba(184,240,60,.2);}
.hero-char img{
  width:135px;height:auto;display:block;
  object-fit:contain;image-rendering:pixelated;
  flex:1;min-height:0;padding-top:.75rem;
}
.hero-char-info{
  width:100%;padding:.7rem .9rem .85rem;
  background:#0d0d0d;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0;
}
.hero-char-name{
  font-family:'Space Grotesk',sans-serif;font-size:12.5px;font-weight:600;
  color:#fff;line-height:1.2;margin-bottom:2px;
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
}
.hero-char-handle{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);}
.hero-char-bio{font-size:11px;color:rgba(255,255,255,.6);line-height:1.55;font-family:'Noto Sans KR',sans-serif;margin-top:4px;}

/* ─── FILTER ─── */
.filter-wrap{
  max-width:var(--max);margin:0 auto;padding:1rem var(--px);
  display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--border);
}
.chip{
  font-family:'Noto Sans KR',sans-serif;font-size:12px;padding:.38rem 1rem;border-radius:20px;
  border:1px solid var(--border);background:transparent;color:var(--sub);
  cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;
}
.chip:hover{border-color:var(--border-hover);color:var(--text);background:var(--surface2);}
.chip.on{background:var(--accent);color:var(--accent-text);border-color:var(--accent);font-weight:700;}
.chip-count{font-family:'DM Mono',monospace;font-size:11px;opacity:.7;}
.chip.on .chip-count{opacity:.65;}

/* ─── LIST ─── */
.list-wrap{max-width:var(--max);margin:0 auto;padding:0 var(--px) 5rem;}
.list-col-header{
  display:grid;grid-template-columns:44px 210px minmax(0,1fr) 115px 76px 24px;
  gap:1.25rem;align-items:center;
  padding:.65rem 0;border-bottom:1px solid var(--border);margin-top:1.25rem;
}
.list-col-header span{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.06em;color:var(--sub);text-transform:uppercase;}

.app-row{
  display:grid;grid-template-columns:44px 210px minmax(0,1fr) 115px 76px 24px;
  gap:1.25rem;align-items:center;
  padding:1rem 0;border-bottom:1px solid var(--border);
  cursor:pointer;text-decoration:none;color:inherit;position:relative;
}
.app-row::before{
  content:'';position:absolute;left:calc(-1 * var(--px));right:calc(-1 * var(--px));top:0;bottom:0;
  background:var(--surface2);opacity:0;transition:opacity .18s;z-index:0;border-radius:0;
}
.app-row:hover::before{opacity:1;}
.app-row>*{position:relative;z-index:1;}
.app-row:hover .row-arrow{opacity:1;transform:translateX(0);}
.app-row:hover .row-num{color:var(--accent);}
.app-row:hover .row-name{color:var(--accent);}

.row-num{font-family:'DM Mono',monospace;font-size:12px;color:var(--sub);text-align:right;transition:color .15s;}
.row-main{display:flex;flex-direction:column;gap:0;min-width:0;}
.row-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:.5rem;transition:color .15s;}
.row-desc-col{font-size:12.5px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;max-width:100%;}
.row-cat{font-family:'DM Mono',monospace;font-size:11px;color:var(--sub);white-space:nowrap;}
.row-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--sub);white-space:nowrap;}
.row-arrow{font-size:13px;color:var(--accent);opacity:0;transform:translateX(-6px);transition:all .18s;text-align:right;}

/* 배지 */
.badge{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;padding:1px 6px;border-radius:3px;flex-shrink:0;}
.badge-as{background:rgba(255,77,77,.13);color:#ff6b6b;border:1px solid rgba(255,77,77,.2);}
.badge-doc{background:rgba(99,179,255,.1);color:#63b3ff;border:1px solid rgba(99,179,255,.2);}
.badge-prompt{background:var(--accent-glow);color:var(--accent);border:1px solid rgba(184,240,60,.2);}

.no-result{padding:4rem 0;text-align:center;font-size:13px;color:var(--muted);}

/* ─── FOOTER ─── */
.footer-wrap{border-top:1px solid var(--border);margin-top:2rem;}
footer{
  max-width:var(--max);margin:0 auto;
  padding:1.5rem var(--px) 2.5rem;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;
}
.ft-brand{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;}
.ft-brand span{color:var(--accent);}
.ft-links{display:flex;gap:1.5rem;align-items:center;}
.ft-link{font-size:13px;color:var(--sub);text-decoration:none;transition:color .15s;}
.ft-link:hover{color:var(--text);}

/* ─── 반응형 ─── */
@media(max-width:900px){
  :root{--px:1.5rem;}
  .list-col-header,.app-row{grid-template-columns:36px 1fr 110px 28px;}
  .list-col-header .col-desc,.list-col-header .col-date,.app-row .row-desc-col,.app-row .row-date{display:none;}
  .hero-inner{grid-template-columns:1fr 180px;gap:1.5rem;}
}
@media(max-width:640px){
  :root{--px:1.25rem;}
  .search-wrap,.threads-btn{display:none;}
  .hero-char{display:none;}
  .hero-stats{gap:1.5rem;}
  .list-col-header,.app-row{grid-template-columns:28px 1fr 28px;}
  .list-col-header .col-cat,.app-row .row-cat{display:none;}
}
</style>
</head>

const catOrder = ['전체','학생부 업무','담임 업무','체육과 업무','마음지도','공통 업무','프롬프트','기타 자료','A/S'];
let currentCat = '전체';
let searchQuery = '';

function countByCat(cat){ return cat==='전체' ? apps.length : apps.filter(a=>a.cat===cat).length; }

function renderFilter(){
  document.getElementById('filterWrap').innerHTML = catOrder.map(c=>`
    <button class="chip ${c===currentCat?'on':''}" data-cat="${c}">
      ${c}<span class="chip-count">${countByCat(c)}</span>
    </button>`).join('');
  document.querySelectorAll('.chip').forEach(b=>{
    b.addEventListener('click',()=>{ currentCat=b.dataset.cat; renderFilter(); renderList(); });
  });
}

function renderList(){
  let f = currentCat==='전체' ? apps : apps.filter(a=>a.cat===currentCat);
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    f=f.filter(a=>a.name.toLowerCase().includes(q)||a.desc.toLowerCase().includes(q)||a.cat.includes(q));
  }
  document.getElementById('heroTotal').textContent = f.length;
  const el = document.getElementById('appList');
  if(!f.length){ el.innerHTML=`<div class="no-result">검색 결과가 없습니다.</div>`; return; }
  el.innerHTML = f.map((a,i)=>{
    const badgeHTML = a.badge==='as' ? '<span class="badge badge-as">A/S</span>'
      : a.badge==='doc' ? '<span class="badge badge-doc">자료</span>'
      : a.badge==='prompt' ? '<span class="badge badge-prompt">AI</span>' : '';
    return `<a class="app-row" href="${a.url}" target="_blank">
      <span class="row-num">${String(i+1).padStart(2,'0')}</span>
      <div class="row-main">
        <div class="row-name">${a.name}${badgeHTML}</div>
      </div>
      <span class="row-desc-col">${a.desc}</span>
      <span class="row-cat">${a.cat}</span>
      <span class="row-date">${a.date}</span>
      <span class="row-arrow">→</span>
    </a>`;
  }).join('');
}

document.getElementById('searchInput').addEventListener('input',e=>{
  searchQuery=e.target.value.trim(); renderList();
});

renderFilter();
renderList();
